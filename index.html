<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Your Future - 岗位投递追踪</title>
  
  <!-- Tailwind CSS & Lucide Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f4ff',
              100: '#d9e2ff',
              200: '#bbcbff',
              300: '#8da6ff',
              400: '#5876ff',
              500: '#165DFF', // 主色
              600: '#0041e6',
              700: '#0033b8',
              800: '#002a94',
              900: '#00237a',
            }
          },
          boxShadow: {
            'card': '0 4px 20px -2px rgba(0, 0, 0, 0.05), 0 2px 10px -2px rgba(0, 0, 0, 0.03)',
            'modal': '0 20px 50px -12px rgba(0, 0, 0, 0.15)',
          }
        }
      }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
    
    :root {
      --brand-primary: #165DFF;
      --brand-bg: #F8FAFC;
    }

    body { 
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; 
      background-color: var(--brand-bg);
    }

    /* 现代滚动条 */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }

    /* 磨砂玻璃导航 */
    .glass-nav { 
      background: rgba(255, 255, 255, 0.75); 
      backdrop-filter: blur(20px) saturate(180%); 
      -webkit-backdrop-filter: blur(20px) saturate(180%); 
    }

    /* 筛选按钮动画 */
    .filter-btn {
      position: relative;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .filter-btn.active {
      background: white;
      color: var(--brand-primary);
      box-shadow: 0 4px 12px rgba(22, 93, 255, 0.12);
    }
    .filter-btn:not(.active):hover {
      background: rgba(255, 255, 255, 0.5);
      color: #1E293B;
    }

    /* 统计卡片渐变 */
    .stats-card-gradient {
      background: linear-gradient(135deg, #165DFF 0%, #0041E6 100%);
    }

    /* 卡片悬停提升 */
    .record-card {
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .record-card:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-slideUp { animation: slideUp 0.5s ease-out forwards; }

    [v-cloak] { display: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 selection:bg-brand-100 min-h-screen flex flex-col">

  <!-- 顶部导航 -->
  <nav class="sticky top-0 z-40 glass-nav border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-brand-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-brand-200">
            <i data-lucide="briefcase" class="w-6 h-6"></i>
          </div>
          <div>
            <span class="text-lg font-bold tracking-tight text-slate-900">Your Future</span>
            <div class="flex items-center gap-1.5 mt-0.5">
              <span id="syncStatusDot" class="w-2 h-2 rounded-full bg-slate-300"></span>
              <span id="syncStatusText" class="text-[10px] font-medium text-slate-500 uppercase tracking-widest">离线模式</span>
            </div>
          </div>
        </div>

        <div class="flex items-center gap-4">
          <button id="btnRefresh" class="flex items-center gap-2 text-sm font-semibold text-slate-600 hover:text-brand-600 transition-colors">
            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            <span class="hidden sm:inline">同步</span>
          </button>
          <button id="btnStats" class="hidden sm:flex items-center gap-2 text-sm font-semibold text-slate-600 hover:text-brand-600 transition-colors">
            <i data-lucide="pie-chart" class="w-4 h-4"></i>
            <span>统计</span>
          </button>
          <div class="h-6 w-px bg-slate-200 hidden sm:block"></div>
          <div id="authZone" class="flex items-center gap-3">
            <button id="btnLogin" class="text-sm font-bold text-brand-600 hover:text-brand-700 transition-colors">登录</button>
            <button id="btnSignUp" class="bg-brand-500 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-brand-600 shadow-md shadow-brand-100 transition-all active:scale-95">注册</button>
          </div>
          <div id="userZone" class="hidden flex items-center gap-3">
            <span id="userEmail" class="text-xs font-medium text-slate-500 hidden md:block"></span>
            <button id="btnLogout" class="text-sm font-bold text-slate-600 hover:text-rose-600 transition-colors">退出</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="flex-1 max-w-6xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <!-- 头部：搜索与筛选 -->
    <header class="mb-10">
      <div class="flex flex-col gap-6">
        <!-- 搜索栏 -->
        <div class="relative group max-w-2xl mx-auto w-full">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <i data-lucide="search" class="w-5 h-5 text-slate-400 group-focus-within:text-brand-500 transition-colors"></i>
          </div>
          <input id="searchBox" type="text" placeholder="搜索公司、岗位或备注信息..." 
            class="w-full pl-12 pr-4 py-4 bg-white border-2 border-slate-100 rounded-3xl text-sm focus:outline-none focus:ring-4 focus:ring-brand-50/50 focus:border-brand-300 transition-all shadow-xl shadow-slate-200/40">
          <div class="absolute inset-y-0 right-4 flex items-center">
            <kbd class="hidden sm:inline-flex items-center gap-1 px-2 py-1 text-xs font-medium text-slate-400 bg-slate-50 border border-slate-200 rounded-lg">
              <span class="text-xs">⌘</span>K
            </kbd>
          </div>
        </div>
        
        <!-- 分类筛选器 -->
        <div class="bg-slate-200/40 p-1.5 rounded-[2rem] inline-flex items-center gap-1 self-center max-w-full overflow-x-auto custom-scrollbar no-scrollbar">
          <button data-filter="all" class="filter-btn active px-6 py-2.5 rounded-[1.5rem] text-sm font-semibold flex items-center gap-2">
            <i data-lucide="layout-grid" class="w-4 h-4"></i>
            全部
          </button>
          <button data-filter="todo" class="filter-btn px-6 py-2.5 rounded-[1.5rem] text-sm font-semibold flex items-center gap-2 text-slate-500">
            <i data-lucide="calendar" class="w-4 h-4"></i>
            待投递
          </button>
          <button data-filter="applied" class="filter-btn px-6 py-2.5 rounded-[1.5rem] text-sm font-semibold flex items-center gap-2 text-slate-500">
            <i data-lucide="send" class="w-4 h-4"></i>
            已投递
          </button>
          <button data-filter="test" class="filter-btn px-6 py-2.5 rounded-[1.5rem] text-sm font-semibold flex items-center gap-2 text-slate-500">
            <i data-lucide="code" class="w-4 h-4"></i>
            笔试中
          </button>
          <button data-filter="interview" class="filter-btn px-6 py-2.5 rounded-[1.5rem] text-sm font-semibold flex items-center gap-2 text-slate-500">
            <i data-lucide="users" class="w-4 h-4"></i>
            面试中
          </button>
          <button data-filter="offer" class="filter-btn px-6 py-2.5 rounded-[1.5rem] text-sm font-semibold flex items-center gap-2 text-slate-500">
            <i data-lucide="award" class="w-4 h-4"></i>
            已获录
          </button>
          <button data-filter="rejected" class="filter-btn px-6 py-2.5 rounded-[1.5rem] text-sm font-semibold flex items-center gap-2 text-slate-500">
            <i data-lucide="frown" class="w-4 h-4"></i>
            已拒绝
          </button>
        </div>
      </div>
    </header>

    <!-- 列表容器 -->
    <div id="listContainer" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
      <!-- 动态加载内容 -->
    </div>

    <!-- 空状态 -->
    <div id="emptyState" class="hidden flex flex-col items-center justify-center py-24 text-center">
      <div class="w-20 h-20 bg-slate-100 rounded-3xl flex items-center justify-center text-slate-400 mb-6">
        <i data-lucide="folder-open" class="w-10 h-10"></i>
      </div>
      <h3 class="text-xl font-bold text-slate-900 mb-2">暂无投递记录</h3>
      <p class="text-slate-500 max-w-xs mx-auto">点击右下角的“+”按钮，开始记录你的求职旅程吧！</p>
    </div>

    <!-- 加载状态 -->
    <div id="loadingState" class="hidden flex items-center justify-center py-24">
      <div class="flex flex-col items-center gap-4">
        <div class="w-10 h-10 border-4 border-brand-100 border-t-brand-500 rounded-full animate-spin"></div>
        <span class="text-sm font-medium text-slate-500">正在同步数据...</span>
      </div>
    </div>

  </main>

  <!-- 悬浮按钮 -->
  <button id="btnAddTask" class="fixed right-6 bottom-6 w-14 h-14 bg-brand-500 text-white rounded-2xl shadow-xl shadow-brand-200 flex items-center justify-center hover:bg-brand-600 hover:scale-105 active:scale-95 transition-all z-40 group">
    <i data-lucide="plus" class="w-8 h-8 group-hover:rotate-90 transition-transform duration-300"></i>
  </button>

  <!-- 统计面板 -->
  <div id="statsOverlay" class="fixed inset-0 z-50 hidden opacity-0 transition-opacity duration-300">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
      <div id="statsModalContent" class="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-modal overflow-hidden translate-y-8 transition-transform duration-300">
        <div class="stats-card-gradient px-8 py-10 text-white relative overflow-hidden">
          <!-- 背景装饰 -->
          <div class="absolute top-0 right-0 -translate-y-1/2 translate-x-1/4 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
          <div class="absolute bottom-0 left-0 translate-y-1/2 -translate-x-1/4 w-48 h-48 bg-brand-400/20 rounded-full blur-2xl"></div>
          
          <div class="relative z-10 flex justify-between items-start">
            <div>
              <h2 class="text-3xl font-bold mb-2">数据概览</h2>
              <p class="text-brand-100 font-medium">洞察你的每一次投递进度</p>
            </div>
            <button id="btnCloseStats" class="p-2 hover:bg-white/10 rounded-2xl text-white transition-colors">
              <i data-lucide="x" class="w-6 h-6"></i>
            </button>
          </div>
          
          <div class="relative z-10 grid grid-cols-2 sm:grid-cols-4 gap-6 mt-10">
            <div class="bg-white/10 backdrop-blur-md rounded-3xl p-4 border border-white/10">
              <div class="text-brand-100 text-xs font-bold uppercase tracking-wider mb-1">总投递</div>
              <div id="statTotal" class="text-2xl font-bold">0</div>
            </div>
            <div class="bg-white/10 backdrop-blur-md rounded-3xl p-4 border border-white/10">
              <div class="text-brand-100 text-xs font-bold uppercase tracking-wider mb-1">面试中</div>
              <div id="statInterview" class="text-2xl font-bold">0</div>
            </div>
            <div class="bg-white/10 backdrop-blur-md rounded-3xl p-4 border border-white/10">
              <div class="text-brand-100 text-xs font-bold uppercase tracking-wider mb-1">已获录</div>
              <div id="statOffer" class="text-2xl font-bold text-emerald-300">0</div>
            </div>
            <div class="bg-white/10 backdrop-blur-md rounded-3xl p-4 border border-white/10">
              <div class="text-brand-100 text-xs font-bold uppercase tracking-wider mb-1">成功率</div>
              <div id="statRate" class="text-2xl font-bold">0%</div>
            </div>
          </div>
        </div>
        
        <div class="p-8 bg-slate-50/50">
          <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-6">详细分布</h3>
          <div id="statsDetailGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- 动态注入详情卡片 -->
          </div>
          
          <div class="mt-8 flex justify-center">
            <button id="btnStatsOk" class="px-8 py-3.5 bg-brand-500 text-white rounded-2xl font-bold hover:bg-brand-600 shadow-lg shadow-brand-100 transition-all active:scale-95">
              同步最新数据
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 模态框：新增/编辑 -->
  <div id="modalOverlay" class="fixed inset-0 z-50 hidden opacity-0 transition-opacity duration-300">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
      <div id="modalContent" class="bg-white w-full max-w-xl rounded-[2.5rem] shadow-modal overflow-hidden translate-y-8 transition-transform duration-300">
        <div class="px-8 py-6 border-b border-slate-50 flex justify-between items-center bg-slate-50/30">
          <div>
            <h2 id="modalTitle" class="text-xl font-black text-slate-900 tracking-tight">新增投递记录</h2>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">每一份努力都值得被记录</p>
          </div>
          <button id="btnCloseModal" class="p-3 hover:bg-slate-100 rounded-2xl text-slate-400 transition-all active:scale-90">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>
        
        <form id="recordForm" class="p-8 space-y-6 max-h-[75vh] overflow-y-auto custom-scrollbar">
          <input type="hidden" id="recordId">
          
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">公司名称</label>
              <div class="relative group">
                <i data-lucide="building" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300 group-focus-within:text-brand-500 transition-colors"></i>
                <input type="text" id="companyName" required placeholder="例如：字节跳动" 
                  class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border-2 border-slate-50 rounded-2xl text-sm font-semibold focus:outline-none focus:ring-4 focus:ring-brand-50/50 focus:border-brand-400 focus:bg-white transition-all">
              </div>
            </div>
            <div class="space-y-2">
              <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">岗位名称</label>
              <div class="relative group">
                <i data-lucide="briefcase" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300 group-focus-within:text-brand-500 transition-colors"></i>
                <input type="text" id="positionName" required placeholder="例如：前端开发工程师" 
                  class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border-2 border-slate-50 rounded-2xl text-sm font-semibold focus:outline-none focus:ring-4 focus:ring-brand-50/50 focus:border-brand-400 focus:bg-white transition-all">
              </div>
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">当前进度</label>
              <div class="relative group">
                <i data-lucide="activity" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300 group-focus-within:text-brand-500 transition-colors pointer-events-none"></i>
                <select id="recordStatus" class="w-full pl-11 pr-10 py-3.5 bg-slate-50 border-2 border-slate-50 rounded-2xl text-sm font-semibold focus:outline-none focus:ring-4 focus:ring-brand-50/50 focus:border-brand-400 focus:bg-white transition-all appearance-none cursor-pointer">
                  <option value="todo">待投递</option>
                  <option value="applied">已投递</option>
                  <option value="test">笔试中</option>
                  <option value="interview">面试中</option>
                  <option value="offer">已获录</option>
                  <option value="rejected">已拒绝</option>
                </select>
                <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300 pointer-events-none"></i>
              </div>
            </div>
            <div class="space-y-2">
              <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">投递时间</label>
              <div class="relative group">
                <input type="datetime-local" id="appliedAt" 
                  class="w-full px-4 py-3.5 bg-slate-50 border-2 border-slate-50 rounded-2xl text-sm font-semibold focus:outline-none focus:ring-4 focus:ring-brand-50/50 focus:border-brand-400 focus:bg-white transition-all">
              </div>
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">职位链接</label>
            <div class="relative group">
              <i data-lucide="link" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300 group-focus-within:text-brand-500 transition-colors"></i>
              <input type="url" id="jobLink" placeholder="粘贴 JD 链接，方便随时查看" 
                class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border-2 border-slate-50 rounded-2xl text-sm font-semibold focus:outline-none focus:ring-4 focus:ring-brand-50/50 focus:border-brand-400 focus:bg-white transition-all">
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">备注信息</label>
            <div class="relative group">
              <textarea id="recordNotes" rows="3" placeholder="记录内推码、笔试题型或面试感悟..." 
                class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl text-sm font-semibold focus:outline-none focus:ring-4 focus:ring-brand-50/50 focus:border-brand-400 focus:bg-white transition-all resize-none custom-scrollbar"></textarea>
            </div>
          </div>

          <div class="flex gap-4 pt-4">
            <button type="button" id="btnCancel" class="flex-1 py-4 text-sm font-bold text-slate-400 hover:text-slate-600 hover:bg-slate-50 rounded-2xl transition-all active:scale-95">取消</button>
            <button type="submit" id="btnSave" class="flex-[2] py-4 bg-brand-500 text-white rounded-2xl text-sm font-bold hover:bg-brand-600 shadow-xl shadow-brand-100 active:scale-95 transition-all flex items-center justify-center gap-2">
              <i data-lucide="save" class="w-4 h-4"></i>
              保存记录
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- 模态框：认证 -->
  <div id="authModal" class="fixed inset-0 z-50 hidden opacity-0 transition-opacity duration-300">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
      <div id="authModalContent" class="bg-white w-full max-w-md rounded-[3rem] shadow-modal overflow-hidden translate-y-8 transition-transform duration-300">
        <div class="p-10 text-center">
          <div class="w-20 h-20 bg-brand-50 rounded-[2rem] flex items-center justify-center text-brand-500 mx-auto mb-8 shadow-inner">
            <i id="authIcon" data-lucide="log-in" class="w-10 h-10"></i>
          </div>
          <h2 id="authTitle" class="text-3xl font-black text-slate-900 mb-2 tracking-tight">欢迎回来</h2>
          <p id="authDesc" class="text-sm font-medium text-slate-400 mb-10">登录后开启云端实时同步功能</p>
          
          <form id="authForm" class="space-y-5 text-left">
            <div class="space-y-2">
              <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">电子邮箱</label>
              <input type="email" id="authEmail" required placeholder="name@example.com" 
                class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl text-sm font-semibold focus:outline-none focus:ring-4 focus:ring-brand-50/50 focus:border-brand-400 focus:bg-white transition-all">
            </div>
            <div class="space-y-2">
              <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">登录密码</label>
              <input type="password" id="authPassword" required placeholder="请输入 6 位以上密码" 
                class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl text-sm font-semibold focus:outline-none focus:ring-4 focus:ring-brand-50/50 focus:border-brand-400 focus:bg-white transition-all">
            </div>
            <button type="submit" id="btnAuthSubmit" class="w-full py-4 bg-brand-500 text-white rounded-2xl text-sm font-bold hover:bg-brand-600 shadow-xl shadow-brand-100 active:scale-95 transition-all mt-4 flex items-center justify-center gap-2">
              立即登录
            </button>
            <div class="pt-4 flex flex-col gap-3">
              <button type="button" id="btnSwitchAuth" class="text-xs font-bold text-brand-600 hover:text-brand-700 transition-colors">没有账号？立即注册</button>
              <button type="button" id="btnAuthClose" class="text-xs font-bold text-slate-300 hover:text-slate-500 transition-colors">暂不登录</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast 通知系统 -->
  <div id="toastContainer" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none"></div>

  <script>
    /* -------------------------------------------------------------------------- */
    /*                                配置与状态管理                                */
    /* -------------------------------------------------------------------------- */
    
    const SUPABASE_URL = 'https://eqtpjbyyabmavtjhgbqf.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_25RkAhRa06WGrPnyfJmvZQ_ZCci6e3R';
    const STORAGE_KEY = 'your_future_local_data';

    const STATUS_MAP = {
      todo: { label: '待投递', color: 'bg-slate-100 text-slate-700', dot: 'bg-slate-400' },
      applied: { label: '已投递', color: 'bg-blue-50 text-blue-700', dot: 'bg-blue-500' },
      test: { label: '笔试中', color: 'bg-amber-50 text-amber-700', dot: 'bg-amber-500' },
      interview: { label: '面试中', color: 'bg-purple-50 text-purple-700', dot: 'bg-purple-500' },
      offer: { label: '已获录', color: 'bg-emerald-50 text-emerald-700', dot: 'bg-emerald-500' },
      rejected: { label: '已拒绝', color: 'bg-rose-50 text-rose-700', dot: 'bg-rose-500' }
    };

    // 状态对象（响应式核心）
    const state = {
      _records: [],
      _user: null,
      _filter: 'all',
      _search: '',
      _loading: false,

      // 获取器与设置器
      get records() { return this._records; },
      set records(val) { 
          if (!Array.isArray(val)) return;
          
          // 安全防护
          if (this._records.length > 0 && val.length === 0 && this._loading) {
            console.warn('检测到加载中的异常清空，已拦截');
            return;
          }

          console.log('Records updated, count:', val.length);
          this._records = val; 
          this.saveLocal();
          this.render(); 
        },
      get user() { return this._user; },
      set user(val) { this._user = val; this.updateUI(); },
      get filter() { return this._filter; },
      set filter(val) { this._filter = val; this.render(); },
      get search() { return this._search; },
      set search(val) { this._search = val; this.render(); },
      get loading() { return this._loading; },
      set loading(val) { this._loading = val; this.updateUI(); },

      // 持久化到本地
      saveLocal() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(this._records));
      },
      loadLocal() {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) this._records = JSON.parse(data);
      },

      // 核心渲染逻辑
      render() {
        renderList();
        lucide.createIcons();
      },

      // UI 状态更新
      updateUI() {
        document.getElementById('loadingState').classList.toggle('hidden', !this.loading);
        document.getElementById('listContainer').classList.toggle('opacity-50', this.loading);
        
        const authZone = document.getElementById('authZone');
        const userZone = document.getElementById('userZone');
        const userEmail = document.getElementById('userEmail');
        const syncDot = document.getElementById('syncStatusDot');
        const syncText = document.getElementById('syncStatusText');

        if (this.user) {
          authZone.classList.add('hidden');
          userZone.classList.remove('hidden');
          userEmail.textContent = this.user.email;
          syncDot.className = 'w-2 h-2 rounded-full bg-emerald-500 animate-pulse';
          syncText.textContent = '云端同步中';
          syncText.className = 'text-[10px] font-bold text-emerald-600 uppercase tracking-widest';
        } else {
          authZone.classList.remove('hidden');
          userZone.classList.add('hidden');
          syncDot.className = 'w-2 h-2 rounded-full bg-slate-300';
          syncText.textContent = '离线模式';
          syncText.className = 'text-[10px] font-medium text-slate-500 uppercase tracking-widest';
        }
      }
    };

    /* -------------------------------------------------------------------------- */
    /*                                Supabase 初始化                              */
    /* -------------------------------------------------------------------------- */

    // 修复变量名冲突：使用 sb 作为客户端实例，避免与全局 supabase SDK 冲突
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function initAuth() {
      // 1. 先读取当前会话，避免 onAuthStateChange 的延迟
      const { data: { session: initSession } } = await sb.auth.getSession();
      if (initSession) {
        state.user = initSession.user;
        await fetchCloudData();
      } else {
        state.loadLocal();
        state.render();
      }

      // 2. 监听后续变化
      sb.auth.onAuthStateChange(async (event, session) => {
        const newUser = session?.user ?? null;
        
        if (event === 'SIGNED_IN') {
          if (!state.user || state.user.id !== newUser.id) {
            state.user = newUser;
            await fetchCloudData();
          }
        } else if (event === 'SIGNED_OUT') {
          state.user = null;
          state.loadLocal();
          state.render();
        }
        // 忽略 USER_UPDATED, TOKEN_REFRESHED 等频繁触发的事件
        // 避免点击页面（触发 session 检查）时导致的重复同步
      });
    }

    /* -------------------------------------------------------------------------- */
    /*                                数据操作逻辑                                 */
    /* -------------------------------------------------------------------------- */

    async function fetchCloudData() {
      if (!state.user || state.loading) return;
      state.loading = true;
      try {
        const { data, error } = await sb
          .from('applications')
          .select('*')
          .order('applied_at', { ascending: false });
        
        if (error) throw error;
        
        // 只有当数据真的存在时才更新（避免由于网络延迟或空响应导致的意外清空）
        const mapped = data.map(r => ({
          id: r.id,
          company: r.company,
          position: r.position,
          status: r.status,
          appliedAt: r.applied_at,
          link: r.link,
          notes: r.note
        }));
        
        // 如果云端有数据，或者这是用户第一次同步（空数据也是有效状态），则更新
        state.records = mapped;
      } catch (err) {
        console.error('Fetch Error:', err);
        showToast('云端同步失败，当前为离线模式', 'warning');
      } finally {
        state.loading = false;
      }
    }

    async function saveRecord(record) {
      const isEdit = !!record.id;
      const tempId = record.id || 'temp_' + Date.now();
      const localRecord = { ...record, id: tempId };
      
      // 1. 立即更新 UI (乐观更新)
      if (isEdit) {
        state.records = state.records.map(r => r.id === record.id ? localRecord : r);
      } else {
        state.records = [localRecord, ...state.records];
      }

      // 2. 如果已登录，尝试同步到云端
      if (state.user) {
        try {
          const payload = {
            company: record.company,
            position: record.position,
            status: record.status,
            applied_at: record.appliedAt,
            link: record.link,
            note: record.notes,
            user_id: state.user.id
          };

          let result;
          if (isEdit) {
            result = await sb.from('applications').update(payload).eq('id', record.id).select();
          } else {
            result = await sb.from('applications').insert([payload]).select();
          }
          
          if (result.error) throw result.error;
          
          // 3. 用服务器返回的真实数据（包含 ID 和数据库默认值）更新本地状态
          const serverRecord = result.data[0];
          const mappedRecord = {
            id: serverRecord.id,
            company: serverRecord.company,
            position: serverRecord.position,
            status: serverRecord.status,
            appliedAt: serverRecord.applied_at,
            link: serverRecord.link,
            notes: serverRecord.note
          };

          state.records = state.records.map(r => (r.id === tempId || r.id === record.id) ? mappedRecord : r);
          showToast('云端同步成功', 'success');
        } catch (err) {
          console.error('Sync Error:', err);
          showToast('云端同步失败，已保存至本地', 'warning');
        }
      } else {
        showToast('本地保存成功', 'success');
      }
    }

    async function deleteRecord(id) {
      // 乐观删除
      const backup = [...state.records];
      state.records = state.records.filter(r => r.id !== id);

      if (state.user) {
        try {
          const { error } = await sb.from('applications').delete().eq('id', id);
          if (error) throw error;
          showToast('已从云端删除', 'success');
        } catch (err) {
          state.records = backup; // 恢复
          showToast('删除失败：' + err.message, 'error');
        }
      } else {
        showToast('已本地删除', 'success');
      }
    }

    /* -------------------------------------------------------------------------- */
    /*                                视图渲染逻辑                                 */
    /* -------------------------------------------------------------------------- */

    function renderList() {
      const container = document.getElementById('listContainer');
      const emptyState = document.getElementById('emptyState');
      
      let filtered = state.records.filter(r => {
        const matchFilter = state.filter === 'all' || r.status === state.filter;
        const matchSearch = r.company.toLowerCase().includes(state.search.toLowerCase()) || 
                          r.position.toLowerCase().includes(state.search.toLowerCase()) ||
                          (r.notes && r.notes.toLowerCase().includes(state.search.toLowerCase()));
        return matchFilter && matchSearch;
      });

      if (filtered.length === 0) {
        container.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }

      emptyState.classList.add('hidden');
      container.innerHTML = filtered.map(r => {
        const meta = STATUS_MAP[r.status];
        const dateStr = r.appliedAt ? new Date(r.appliedAt).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }) : '刚刚';
        
        return `
          <div class="record-card bg-white rounded-[2rem] p-6 border border-slate-100 shadow-card animate-slideUp">
            <div class="flex justify-between items-start mb-6">
              <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 group-hover:bg-brand-50 group-hover:text-brand-500 transition-colors">
                  <i data-lucide="building-2" class="w-6 h-6"></i>
                </div>
                <div>
                  <h4 class="text-lg font-bold text-slate-900 leading-tight">${r.company}</h4>
                  <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mt-0.5">${dateStr}</p>
                </div>
              </div>
              <span class="px-3.5 py-1.5 rounded-xl text-[10px] font-bold ${meta.color} uppercase tracking-widest border border-current/10">
                ${meta.label}
              </span>
            </div>
            
            <div class="mb-6">
              <p class="text-sm font-bold text-slate-700">${r.position}</p>
              ${r.notes ? `
                <p class="text-xs text-slate-500 mt-2 leading-relaxed line-clamp-2 bg-slate-50 p-3 rounded-2xl border border-slate-100 italic">
                  “ ${r.notes} ”
                </p>
              ` : ''}
            </div>
            
            <div class="flex items-center justify-between pt-5 border-t border-slate-50">
              <div class="flex gap-2">
                <button onclick="editRecord('${r.id}')" class="p-2.5 bg-slate-50 hover:bg-brand-50 rounded-xl text-slate-400 hover:text-brand-600 transition-all active:scale-90">
                  <i data-lucide="edit-3" class="w-4 h-4"></i>
                </button>
                <button onclick="confirmDelete('${r.id}')" class="p-2.5 bg-slate-50 hover:bg-rose-50 rounded-xl text-slate-400 hover:text-rose-600 transition-all active:scale-90">
                  <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
              </div>
              ${r.link ? `
                <a href="${r.link}" target="_blank" class="flex items-center gap-2 px-4 py-2.5 bg-brand-50 text-brand-600 rounded-xl text-xs font-bold hover:bg-brand-500 hover:text-white transition-all shadow-sm shadow-brand-100 active:scale-95">
                  查看职位 <i data-lucide="arrow-up-right" class="w-3.5 h-3.5"></i>
                </a>
              ` : `
                <span class="text-[10px] font-bold text-slate-300 uppercase tracking-widest">暂无链接</span>
              `}
            </div>
          </div>
        `;
      }).join('');
    }

    /* -------------------------------------------------------------------------- */
    /*                                事件绑定逻辑                                 */
    /* -------------------------------------------------------------------------- */

    function setupEvents() {
      // 搜索功能
      document.getElementById('searchBox').addEventListener('input', (e) => {
        state.search = e.target.value;
      });

      // 快捷键 ⌘K 聚焦搜索
      window.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
          e.preventDefault();
          document.getElementById('searchBox').focus();
        }
      });

      // 筛选功能
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('active', 'bg-white', 'text-brand-500', 'shadow-lg', 'shadow-brand-100');
            b.classList.add('text-slate-500');
          });
          btn.classList.add('active', 'bg-white', 'text-brand-500', 'shadow-lg', 'shadow-brand-100');
          btn.classList.remove('text-slate-500');
          state.filter = btn.dataset.filter;
        });
      });

      // 模态框控制
      const openModal = (title = '新增投递记录', data = null) => {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('recordId').value = data?.id || '';
        document.getElementById('companyName').value = data?.company || '';
        document.getElementById('positionName').value = data?.position || '';
        document.getElementById('recordStatus').value = data?.status || 'todo';
        document.getElementById('appliedAt').value = data?.appliedAt ? data.appliedAt.slice(0, 16) : new Date().toISOString().slice(0, 16);
        document.getElementById('jobLink').value = data?.link || '';
        document.getElementById('recordNotes').value = data?.notes || '';
        
        const overlay = document.getElementById('modalOverlay');
        const content = document.getElementById('modalContent');
        overlay.classList.remove('hidden');
        setTimeout(() => {
          overlay.classList.add('opacity-100');
          content.classList.remove('translate-y-8');
        }, 10);
      };

      const closeModal = () => {
        const overlay = document.getElementById('modalOverlay');
        const content = document.getElementById('modalContent');
        overlay.classList.remove('opacity-100');
        content.classList.add('translate-y-8');
        setTimeout(() => overlay.classList.add('hidden'), 300);
      };

      document.getElementById('btnAddTask').addEventListener('click', () => openModal());
      document.getElementById('btnCloseModal').addEventListener('click', closeModal);
      document.getElementById('btnCancel').addEventListener('click', closeModal);

      // 表单提交
      document.getElementById('recordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSave');
        if (btn.disabled) return; // 防止重复点击
        
        btn.disabled = true;
        btn.innerHTML = '<span class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>';
        
        const recordId = document.getElementById('recordId').value;
        const record = {
          id: recordId || null,
          company: document.getElementById('companyName').value.trim(),
          position: document.getElementById('positionName').value.trim(),
          status: document.getElementById('recordStatus').value,
          appliedAt: new Date(document.getElementById('appliedAt').value).toISOString(),
          link: document.getElementById('jobLink').value.trim(),
          notes: document.getElementById('recordNotes').value.trim()
        };

        try {
          await saveRecord(record);
          closeModal();
          showToast(recordId ? '更新成功' : '新增成功', 'success');
        } catch (err) {
          showToast('操作失败: ' + err.message, 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = '保存记录';
        }
      });

      // 认证模态框控制
      const openAuth = (mode = 'login') => {
        const isLogin = mode === 'login';
        document.getElementById('authTitle').textContent = isLogin ? '欢迎回来' : '开启云同步';
        document.getElementById('authDesc').textContent = isLogin ? '登录后开启云端实时同步功能' : '创建一个账号，在多端查看记录';
        document.getElementById('btnAuthSubmit').textContent = isLogin ? '立即登录' : '注册账号';
        document.getElementById('btnSwitchAuth').textContent = isLogin ? '没有账号？立即注册' : '已有账号？立即登录';
        document.getElementById('authIcon').setAttribute('data-lucide', isLogin ? 'log-in' : 'user-plus');
        lucide.createIcons();

        const overlay = document.getElementById('authModal');
        const content = document.getElementById('authModalContent');
        overlay.classList.remove('hidden');
        setTimeout(() => {
          overlay.classList.add('opacity-100');
          content.classList.remove('translate-y-8');
        }, 10);
      };

      const closeAuth = () => {
        const overlay = document.getElementById('authModal');
        const content = document.getElementById('authModalContent');
        overlay.classList.remove('opacity-100');
        content.classList.add('translate-y-8');
        setTimeout(() => overlay.classList.add('hidden'), 300);
      };

      document.getElementById('btnLogin').addEventListener('click', () => openAuth('login'));
      document.getElementById('btnSignUp').addEventListener('click', () => openAuth('signup'));
      document.getElementById('btnAuthClose').addEventListener('click', closeAuth);
      document.getElementById('btnSwitchAuth').addEventListener('click', () => {
        const isLogin = document.getElementById('authTitle').textContent === '欢迎回来';
        openAuth(isLogin ? 'signup' : 'login');
      });

      document.getElementById('authForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;
        const isLogin = document.getElementById('authTitle').textContent === '欢迎回来';
        const btn = document.getElementById('btnAuthSubmit');
        
        btn.disabled = true;
        btn.innerHTML = '<span class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>';

        try {
          let result;
          if (isLogin) {
            result = await sb.auth.signInWithPassword({ email, password });
          } else {
            result = await sb.auth.signUp({ email, password });
          }
          if (result.error) throw result.error;
          
          showToast(isLogin ? '欢迎回来！' : '注册成功，请查收验证邮件', 'success');
          closeAuth();
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = isLogin ? '立即登录' : '注册账号';
        }
      });

      document.getElementById('btnLogout').addEventListener('click', async () => {
        await sb.auth.signOut();
        showToast('已安全退出', 'info');
      });

      // 同步按钮
      document.getElementById('btnRefresh').addEventListener('click', () => {
        if (state.user) {
          fetchCloudData();
          showToast('正在从云端拉取最新数据...', 'info');
        } else {
          showToast('当前处于离线模式，无法同步', 'warning');
        }
      });

      // 统计功能增强
      const openStats = () => {
        const stats = state.records.reduce((acc, r) => {
          acc[r.status] = (acc[r.status] || 0) + 1;
          return acc;
        }, {});
        
        const total = state.records.length;
        const interviewCount = stats['interview'] || 0;
        const offerCount = stats['offer'] || 0;
        const rate = total > 0 ? Math.round((offerCount / total) * 100) : 0;
        
        document.getElementById('statTotal').textContent = total;
        document.getElementById('statInterview').textContent = interviewCount;
        document.getElementById('statOffer').textContent = offerCount;
        document.getElementById('statRate').textContent = rate + '%';
        
        const detailGrid = document.getElementById('statsDetailGrid');
        detailGrid.innerHTML = Object.entries(STATUS_MAP).map(([key, meta]) => {
          const count = stats[key] || 0;
          const percent = total > 0 ? Math.round((count / total) * 100) : 0;
          return `
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between">
              <div class="flex items-center gap-4">
                <div class="w-2 h-8 rounded-full ${meta.dot}"></div>
                <div>
                  <div class="text-sm font-bold text-slate-800">${meta.label}</div>
                  <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${percent}%</div>
                </div>
              </div>
              <div class="text-xl font-black text-slate-900">${count}</div>
            </div>
          `;
        }).join('');
        
        const overlay = document.getElementById('statsOverlay');
        const content = document.getElementById('statsModalContent');
        overlay.classList.remove('hidden');
        setTimeout(() => {
          overlay.classList.add('opacity-100');
          content.classList.remove('translate-y-8');
        }, 10);
        lucide.createIcons();
      };

      const closeStats = () => {
        const overlay = document.getElementById('statsOverlay');
        const content = document.getElementById('statsModalContent');
        overlay.classList.remove('opacity-100');
        content.classList.add('translate-y-8');
        setTimeout(() => overlay.classList.add('hidden'), 300);
      };

      document.getElementById('btnStats').addEventListener('click', openStats);
      document.getElementById('btnCloseStats').addEventListener('click', closeStats);
      document.getElementById('btnStatsOk').addEventListener('click', () => {
        if (state.user) fetchCloudData();
        closeStats();
      });
    }

    // 全局方法挂载到 window 方便 HTML 调用
    window.editRecord = (id) => {
      const record = state.records.find(r => r.id === id);
      if (record) {
        document.getElementById('modalTitle').textContent = '编辑投递记录';
        document.getElementById('recordId').value = record.id;
        document.getElementById('companyName').value = record.company;
        document.getElementById('positionName').value = record.position;
        document.getElementById('recordStatus').value = record.status;
        document.getElementById('appliedAt').value = record.appliedAt ? record.appliedAt.slice(0, 16) : new Date().toISOString().slice(0, 16);
        document.getElementById('jobLink').value = record.link || '';
        document.getElementById('recordNotes').value = record.notes || '';
        
        const overlay = document.getElementById('modalOverlay');
        const content = document.getElementById('modalContent');
        overlay.classList.remove('hidden');
        setTimeout(() => {
          overlay.classList.add('opacity-100');
          content.classList.remove('translate-y-8');
        }, 10);
      }
    };

    window.confirmDelete = (id) => {
      const record = state.records.find(r => r.id === id);
      if (confirm(`确定要删除 ${record.company} 的记录吗？`)) {
        deleteRecord(id);
      }
    };

    /* -------------------------------------------------------------------------- */
    /*                                通用工具函数                                 */
    /* -------------------------------------------------------------------------- */

    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      const colors = {
        success: 'bg-emerald-500',
        error: 'bg-rose-500',
        warning: 'bg-amber-500',
        info: 'bg-slate-800'
      };
      
      toast.className = `${colors[type]} text-white px-6 py-3 rounded-2xl text-sm font-bold shadow-xl animate-fadeIn pointer-events-auto flex items-center gap-3`;
      toast.innerHTML = `<span>${message}</span>`;
      
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-2');
        toast.style.transition = 'all 0.5s ease';
        setTimeout(() => toast.remove(), 500);
      }, 3000);
    }

    // 初始化应用
    (function init() {
      state.loadLocal();
      state.render();
      initAuth();
      setupEvents();
      lucide.createIcons();
      
      // 样式增强：首屏动画
      document.body.classList.add('opacity-0');
      setTimeout(() => {
        document.body.style.transition = 'opacity 0.8s ease';
        document.body.classList.remove('opacity-0');
      }, 50);
    })();
  </script>
</body>
</html>
